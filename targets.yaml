  # ── Purchase hooks BUILT + installed (2026-07-08) ──────────────────────
  # tools/hook_purchase.py; docs/PURCHASE_FLOW_STATIC_ANALYSIS.md
  purchase_detect_hook:
    kind: jal_hook
    status: installed_needs_live_graduation
    patch_addr: 0x00337A7C
    original_instr: 0x0C0CDCDE
    trampoline: 0x00720920
    ring: 0x00720B00          # count|head|records[16]x16B (recptr,amt,wallet,ord)
