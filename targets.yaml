      Wired to client as VehiclePurchased event -> "Vehicle Purchased: <id>".
      Graduate by making one dealer purchase and checking `status` count>0.

  vehicle_permit_deny_gate:
    kind: jal_hook
    status: installed_enforce_off
    patch_addr: 0x003378BC
    original_instr: 0x0C0C8212
    trampoline: 0x00720A00
    enforce_flag: 0x007205FC   # default 0 = vanilla-identical
    permit_table: 0x00720600   # 96xu8, 1=allow, indexed by 0x1C catalog index
    note: delay slot sets a2=oktobuy=1; when enforcing, resolves index via
      0x004AF870 and flips a2->0 + clears pending flag 0x006179BD if permit=0.
      Graduate live by enforce=1 + deny a cheap car, confirm buy cancels with
      money/garage intact and no softlock.

