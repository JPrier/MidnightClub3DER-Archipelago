# MC3 Discovery Targets — single source of truth for all RE targets
# Updated per mc3_automated_discovery_method.md

targets:
  # ── Confirmed ──────────────────────────────────────────────────────────
  money:
    kind: data_field
    status: confirmed
    address: 0x00800870
    type: u32
    validate: [read_write_roundtrip]

  money_earned:
    kind: data_field
    status: confirmed
    address: 0x00800874
    type: u32

  player_race_position:
    kind: data_field
    status: deprecated_unstable_address
    address: 0x007CA044
    type: u32
    note: >
      0x007CA044 is inside the stats catalog (QS%k entry). Catalog entries
      INSERT-SHIFT as new stat tags appear (e.g. LOCg inserted on first
      collectible), so this address moves. Use live_race_position or
      tag-scan the stats catalog instead.

  live_race_position:
    kind: data_field
    status: confirmed
    address: 0x006BE4F0
    type: u32
    note: 1=1st..6=6th during race; verified s4=1, s8=3, s9=5

  stats_catalog:
    kind: data_structure
    status: confirmed
    pointer: 0x00800878          # -> catalog base (0x007C9EF0 observed)
    entry_size: 16
    entry_layout: "tag:u32(4CC) index:u32 meta_ptr:u32 value:u32|f32"
    terminator: 0xCDCDCDCD
    access_protocol: tag_scan    # NEVER use fixed addresses inside the catalog
    note: >
      Career stats registry. Tags read reversed (LOC->COL). Entries insert
      as stats first occur, shifting later entries by 16 bytes.
      Verified live against build-13 payload and dumps s6/s13/s14.

  # ── Confirmed stats (accessed via stats_catalog tag scan) ─────────────
  collectibles_per_city:
    kind: stat
    status: confirmed
    tag: LOCc                    # index = city id (0,1,2)
    proof: s6->s13 idx0 0->1 on collecting one Rockstar logo

  collectibles_total:
    kind: stat
    status: confirmed
    tag: LOCg
    proof: entry inserted with value 1 on first collectible (s13)

  tournament_wins:
    kind: stat
    status: confirmed
    tag: UOTk                    # 'TOU' reversed
    proof: s13->s14 0->1 on tournament win

  race_wins:
    kind: stat
    status: confirmed
    tag: NIWk                    # 'WIN' reversed; NIWg global, NIWv per-vehicle
    proof: s13->s14 4->6 after tournament

  races_entered:
    kind: stat
    status: confirmed
    tag: RACk
    proof: s13->s14 10->11

  career_earnings:
    kind: stat
    status: confirmed
    tag: EC$k                    # '$CE' reversed
    proof: s13->s14 2900->37880; independent of wallet money

  second_place_finishes: { kind: stat, status: confirmed, tag: DN2k }
  third_place_finishes:  { kind: stat, status: confirmed, tag: DR3k }

  route_best_times:
    kind: stat
    status: confirmed
    tag: "IT:r"                  # 'r:TI' — per-route best time (float seconds)
    note: >
      index = STABLE global route id. New entries appear when a route is
      first completed (s14 added idx 0x3e,0x3f,0x41 for tournament races).
      Route-id set is a strong event-identity/location-check source.

  route_avg_speeds: { kind: stat, status: confirmed, tag: PSAr, note: "index = route id" }

  last_event_path:
    kind: data_field
    status: confirmed
    address_expr: "profile_ptr -> +0x69 (cstring, +0x68 may be len/flag)"
    proof: >
      live + s14: 'utox\\med\\sd_autox_med_oceanseleven_race01' after autocross
      tournament; s6: '...order\\easy\\sd_race...'. Event identity = file path.

  profile_copies:
    kind: data_structure
    status: confirmed
    note: two profile copies at 0x007D2310 and 0x007D3A00 (stride 0x16F0)

  # ── Refuted candidates (were volatile noise) ───────────────────────────
  refuted_candidates:
    kind: note
    status: refuted
    note: >
      0x00618D24/0x00621708 (collectible bitset), 0x00618AD8/0x006145FC
      (garage ownership), 0x00615A3C (tournament win) — cross-state analysis
      shows unrelated drift (e.g. 0x615A3C=1 in s2 pre-tournament). Do not use.

  profile_ptr:
    kind: pointer
    status: confirmed
    address: 0x00619B14
    points_to: 0x007D2310

  vehicle_list_ptr:
    kind: pointer
    status: confirmed
    address: 0x006E0170
    points_to: 0x007D28B0

  on_load_career_done:
    kind: jal_hook
    status: confirmed
    patch_addr: 0x001B0C20
    original_instr: 0x0C06C624
    original_target: 0x001B1890

  set_car_cfg:
    kind: jal_hook
    status: confirmed
    patch_addr: 0x004AE100
    original_instr: 0x0C1748E0
    original_target: 0x005D2380

  # ── needs_savestate_diff ───────────────────────────────────────────────
  current_city:
    kind: data_field
    status: needs_savestate_diff
    needed_states: [san_diego_free_roam, atlanta_free_roam]
    search_ranges: ["0x00600000-0x00900000"]
    search_types: [u8, u16, u32]

  city_unlock_flags:
    kind: data_field
    status: needs_savestate_diff
    needed_states: [san_diego_locked, atlanta_unlocked, detroit_unlocked]
    search_ranges: ["0x00619000-0x007D4000"]

  garage_ownership:
    kind: data_structure
    status: needs_savestate_diff
    needed_states: [garage_one_vehicle, garage_three_vehicles]

  current_event_id:
    kind: data_field
    status: partially_solved
    note: >
      last_event_path (profile+0x69) identifies the event just played by
      file path; route_best_times (IT:r) indices identify completed routes.
      Still needed: the CURRENT/selected event before race start (for gating).
    needed_states: [event_prompt_vanessa, event_prompt_tournament]
    search_ranges: ["0x00600000-0x00900000"]

  class_unlock_flags:
    kind: data_field
    status: needs_savestate_diff
    needed_states: [class_d_locked, class_c_unlocked]

  part_catalog:
    kind: data_structure
    status: needs_savestate_diff
    needed_states: [part_shop_open]

  # ── needs_static_hook_discovery ────────────────────────────────────────
  on_race_finished:
    kind: unsafe_instruction_site
    status: needs_static_hook_discovery
    observed_addr: 0x003EDAC8
    original_instr: 0x00800008
    decoded: "jr a0"
    goal: find safe race-finish hook point

  on_race_over:
    kind: unsafe_instruction_site
    status: needs_static_hook_discovery
    observed_addr: 0x003EE860
    original_instr: 0x24050004
    decoded: "addiu a1, zero, 4"

  on_save_data_1:
    kind: unsafe_instruction_site
    status: needs_static_hook_discovery
    observed_addr: 0x001AE8A0
    original_instr: 0x00000000
    decoded: "nop"

  on_save_data_2:
    kind: unsafe_instruction_site
    status: needs_static_hook_discovery
    observed_addr: 0x001AF4F8
    original_instr: 0x27A40030
    decoded: "addiu a0, sp, 0x30"

  on_create_savegame:
    kind: unsafe_instruction_site
    status: needs_static_hook_discovery
    observed_addr: 0x001AF098
    original_instr: 0xFFBF0078
    decoded: "sd ra, 0x78(sp)"

  # ── needs_writer_discovery ─────────────────────────────────────────────
  vanilla_reward_writer:
    kind: writer
    status: needs_writer_discovery
    target_field: city_unlock_flags
    goal: find function that writes city unlock flags

  # ── needs_blocking_discovery ───────────────────────────────────────────
  event_start_gate:
    kind: gate
    status: needs_blocking_discovery
    goal: find safe deny path for starting an event